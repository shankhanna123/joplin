// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24

        compileSdkVersion = 35
        targetSdkVersion = 35

        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        // Use gradlePluginPortal as an alternative source for Android Gradle Plugin
        gradlePluginPortal()
        mavenCentral()
        maven { url "https://maven.google.com" }
        // Add JCenter as backup (though deprecated, still works for older artifacts)
        @Suppress("DEPRECATION")
        jcenter()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.4")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

allprojects {
    repositories {
        gradlePluginPortal()
        mavenCentral()
        maven { url "https://maven.google.com" }
        @Suppress("DEPRECATION")
        jcenter()

        maven {
            // expo-camera bundles a custom com.google.android:cameraview
            url "$rootDir/../node_modules/expo-camera/android/maven"
        }
    }
    
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            // Note: Removed problematic substitution rule for 8.5.0 to 8.0.2
            // All dependencies should now use the updated 8.1.4 version
        }
    }
}
 
apply plugin: "com.facebook.react.rootproject"
