name: Build APK for Personal Use
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK for Tablet
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup networking and DNS
        run: |
          echo "8.8.8.8 google.com" | sudo tee -a /etc/hosts
          echo "8.8.4.4 dl.google.com" | sudo tee -a /etc/hosts
          echo "216.58.194.174 maven.google.com" | sudo tee -a /etc/hosts

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Yarn
        run: corepack enable

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            packages/app-mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/app-mobile/android/gradle/wrapper/gradle-wrapper.properties', 'packages/app-mobile/android/build.gradle', 'packages/app-mobile/android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build

      - name: Pre-warm Gradle
        run: |
          cd packages/app-mobile/android
          ./gradlew --version

      - name: Build APK for Tablet  
        run: |
          cd packages/app-mobile/android
          echo "🚀 Building Joplin APK for Android tablet..."
          
          # Configure debug signing to avoid release key issues
          echo "🔧 Configuring debug signing..."
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/' app/build.gradle
          
          # Build with retry logic for network issues
          echo "🏗️ Building release APK with debug signing..."
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            if timeout 20m ./gradlew assembleRelease --no-daemon --stacktrace --max-workers=1 --info; then
              echo "✅ Build successful on attempt $i"
              break
            else
              echo "❌ Build failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "💥 Build failed after 3 attempts"
                exit 1
              fi
              echo "⏳ Waiting 60 seconds before retry..."
              sleep 60
              echo "🧹 Cleaning for retry..."
              ./gradlew clean || true
            fi
          done

      - name: Verify APK was created
        run: |
          APK_FILE="packages/app-mobile/android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_FILE" ]; then
            echo "✅ APK found: $APK_FILE"
            echo "📏 APK size: $(du -h "$APK_FILE" | cut -f1)"
            ls -la "$(dirname "$APK_FILE")"
          else
            echo "❌ APK not found at expected location: $APK_FILE"
            echo "📁 Contents of build/outputs/:"
            find packages/app-mobile/android/app/build/outputs/ -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joplin-tablet-apk
          path: packages/app-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "✅ APK build completed successfully!"
          echo "📱 Your Joplin APK is ready for installation on your Android tablet"
          echo "📥 Download it from the 'Actions' tab > 'Artifacts' section"
          echo ""
          echo "📋 Installation Instructions:"
          echo "1. Go to Actions tab in your GitHub repository"
          echo "2. Click on this workflow run"
          echo "3. Download 'joplin-tablet-apk' from Artifacts section"
          echo "4. Extract the zip file to get app-release.apk"
          echo "5. Transfer to your Android device and install"
