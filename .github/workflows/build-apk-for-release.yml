name: Build APK for Personal Use
on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK for Tablet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '20'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build APK for Tablet
        run: |
          cd packages/app-mobile/android
          echo "🚀 Building Joplin APK for Android tablet..."
          # Use debug signing to avoid need for release keys
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/' app/build.gradle
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joplin-tablet-apk
          path: packages/app-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "✅ APK build completed successfully!"
          echo "📱 Your Joplin APK is ready for installation on your Android tablet"
          echo "📥 Download it from the 'Actions' tab > 'Artifacts' section"
